  <style>
    /* Ensure event titles wrap to next line when they don't fit the box */
    .event {
      white-space: normal;
      /* allow wrapping inside the event button */
      align-items: flex-start;
      /* keep content aligned to top */
      padding: 6px 8px;
      border-radius: 6px;
      color: #fff;
      /* default text color on colored background */
      display: flex;
      gap: 8px;
      background: transparent;
      /* will be set per-event via inline style */
      border: none;
    }

    .event__title {
      display: inline-block;
      white-space: normal;
      /* allow wrapping */
      overflow-wrap: anywhere;
      /* break long words if needed */
      word-break: break-word;
      max-width: calc(100% - 0px);
      /* full width inside event */
    }

    .event__color {
      display: none;
      /* hide the small dot, use full background color instead */
    }

    .event__time {
      display: none;
      /* hide time in month list view to keep layout compact */
    }
  </style>

  <dialog class="dialog" data-dialog="event-details">

  <dialog class="dialog" data-dialog="event-delete">
    <div class="dialog__wrapper">
      <div class="dialog__header">
        <h2 class="dialog__title">Delete event</h2>

        <button class="button button--icon button--secondary" data-dialog-close-button autofocus>

            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>

      <div class="dialog__content">
        <p>Do you really want to delete <strong data-event-delete-title></strong>?</p>
      </div>

      <div class="dialog__footer">
        <div class="dialog__actions">
          <button class="button button--secondary" data-dialog-close-button>Cancel</button>
          <button class="button button--danger" data-event-delete-button>Delete</button>
        </div>
      </div>
    </div>
  </dialog>

                  class="button__icon">

      { date: '2026-07-24', title: 'Late registration', color: '#ef4444' },
      { date: '2026-07-27', title: 'Classes begin', color: '#ef4444' }
    ];

    // Utility to map month name to number (1-12)
    const monthNames = {
      January: '01', February: '02', March: '03', April: '04', May: '05', June: '06', July: '07', August: '08', September: '09', October: '10', November: '11', December: '12'
    };

    function buildEventElement(ev) {
      const li = document.createElement('li');
      li.className = 'event-list__item';
      li.setAttribute('data-event-list-item', '');

      const btn = document.createElement('button');
      btn.className = 'event';
      btn.setAttribute('data-event', '');

      // apply the provided color as the event background and ensure readable text
      btn.style.background = ev.color;
      btn.style.color = '#ffffff';

      const title = document.createElement('span');
      title.className = 'event__title';
      title.textContent = ev.title;

      btn.appendChild(title);

      li.appendChild(btn);
      return li;
    }

    function parseNavMonthYear() {
      const navTime = document.querySelector('[data-nav-date]');
      if (!navTime) return null;
      const txt = navTime.textContent.trim();
      // Expect format like "January 2026" or "Jan 2026"
      const parts = txt.split(' ');
      if (parts.length < 2) return null;
      const monthName = parts[0];
      const year = parts[parts.length - 1];
      if (!monthNames[monthName]) return null;
      return { month: monthNames[monthName], year };
    }

    function injectEventsIntoMonth() {
      const monthInfo = parseNavMonthYear();
      if (!monthInfo) return;
      const monthCalendar = document.querySelector('[data-month-calendar]');
      if (!monthCalendar) return;

      // For each day item in month calendar
      const dayItems = monthCalendar.querySelectorAll('[data-month-calendar-day]');
      dayItems.forEach((dayItem) => {
        // avoid duplicate injections
        if (dayItem.dataset.injected === 'true') return;

        const labelBtn = dayItem.querySelector('[data-month-calendar-day-label]');
        if (!labelBtn) return;
        const dayTxt = labelBtn.textContent.trim();
        if (!/^[0-9]+$/.test(dayTxt)) return;
        const dd = dayTxt.padStart(2, '0');
        const iso = `${monthInfo.year}-${monthInfo.month}-${dd}`;

        const matched = injectedMonthEvents.filter(e => e.date === iso);
        if (matched.length) {
          const eventList = dayItem.querySelector('[data-event-list]') || dayItem.querySelector('.event-list');
          if (eventList) {
            matched.forEach(ev => {
              const el = buildEventElement(ev);
              el.setAttribute('data-injected', 'true');
              eventList.appendChild(el);
            });
          }
        }

        dayItem.dataset.injected = 'true';
      });
    }

    // Observe calendar area for month-calendar insertion / navigation changes
    const observer = new MutationObserver((mutations) => {
      for (const m of mutations) {
        if (m.addedNodes.length || m.type === 'attributes') {
          injectEventsIntoMonth();
        }
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      // Initial attempt
      injectEventsIntoMonth();

      // Observe the calendar container
      const calendarRoot = document.querySelector('[data-calendar]') || document.body;
      observer.observe(calendarRoot, { childList: true, subtree: true, attributes: true });

      // Also re-run when view select changes
      const viewSelect = document.querySelector('[data-view-select]');
      if (viewSelect) {
        viewSelect.addEventListener('change', () => setTimeout(injectEventsIntoMonth, 100));
      }

      // If nav next/previous buttons exist, hook them to re-run after navigation
      const prev = document.querySelector('[data-nav-previous-button]');
      const next = document.querySelector('[data-nav-next-button]');
      [prev, next].forEach(btn => {
        if (btn) btn.addEventListener('click', () => setTimeout(injectEventsIntoMonth, 150));
      });
    });

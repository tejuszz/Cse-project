<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professor Dashboard - NIT Delhi</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/professor.css"> 
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h3 id="profName">Professor Portal</h3>
        </div>
        
        <ul id="profSubjectList" class="course-list">
            </ul>

        <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main class="main-content">
        <div id="uploadUI" style="display: none;">
            
            <!-- Upload Box -->
            <div class="upload-container">
                <h2 id="activeSubject" style="color: #0056b3; margin-bottom: 10px;">Select a Section</h2>
                <p id="activeSection" style="margin-bottom: 25px; color: #666; font-weight: 500;"></p>
                
                <div class="form-group">
                    <label>Material Title</label>
                    <input type="text" id="mTitle">
                </div>
                
                <div class="form-group">
                    <label>Link</label>
                    <input type="text" id="mLink">
                </div>

                <div class="form-group">
                    <label>Upload File</label>
                    <input type="file" id="fileInput">
                </div>

                <div class="btn-row">
                    <button type="button" class="btn-upload" onclick="uploadMaterial()">Upload Material</button>
                </div>
            </div>

            <!-- ✅ ADD THIS HERE -->
            <div class="uploaded-section">
                <h3>Your Uploaded Materials</h3>
                <div id="uploadedList"></div>
            </div>

        </div>

        <div id="placeholder" style="text-align: center; margin-top: 100px; color: #999;">
            <h3>Please select a subject and section from the sidebar to begin uploading.</h3>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/professor.js"></script>
</body>
</html>

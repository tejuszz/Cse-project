<!DOCTYPE html>
<html>
<head>

<title>Campus Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map{
height:600px;
width:90%;
margin:auto;
}
</style>

</head>

<body>

<a href="student.html">⬅ Back to Dashboard</a>

<h2>NIT Delhi Campus Map</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// create map
var map = L.map('map').setView([28.816,77.047],17);

// map tiles
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution:'© OpenStreetMap'
}).addTo(map);

// markers
L.marker([28.8165,77.0468])
.addTo(map)
.bindPopup("Academic Block");

L.marker([28.8171,77.0473])
.addTo(map)
.bindPopup("Hostel");

L.marker([28.8159,77.0470])
.addTo(map)
.bindPopup("Library");

L.marker([28.8163,77.0475])
.addTo(map)
.bindPopup("Mess");

// show coordinates when clicking map
map.on('click', function(e){
alert("Lat: " + e.latlng.lat + " , Lng: " + e.latlng.lng);
});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<title>Campus Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map{
height:600px;
width:90%;
margin:auto;
}
</style>

</head>

<body>

<a href="student.html">⬅ Back to Dashboard</a>

<h2>NIT Delhi Campus Map</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

    // create map (NO lat/lng now)
    var map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1
    });

    // image size (IMPORTANT)
    // You need to adjust this based on your image resolution
    var bounds = [[0,0], [1080,1920]];

    // add your image
    var image = L.imageOverlay('images/map.png', bounds).addTo(map);
    map.on('click', function(e){
        console.log(e.latlng);
    });
    // fit map to image
    map.fitBounds(bounds);
    // sample markers
    L.marker([500, 600]).addTo(map).bindPopup("Football Ground");

    L.marker([300, 400]).addTo(map).bindPopup("Academic Block");

    L.marker([800, 1200]).addTo(map).bindPopup("Main Building");

</script>

</body>
</html>

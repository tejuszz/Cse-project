<!DOCTYPE html>
<html>
<head>

<title>Campus Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/map.css">

</head>

<body class="map-page">

<!--  HEADER  -->
<div class="top-bar">
    <a href="student.html" class="back-btn">⬅ Back to Dashboard</a>
    <h2 class="title">NIT Delhi Campus Map</h2>
</div>

<!--  MAIN LAYOUT  -->
<div class="main-container">
    
    <div id="map"></div>

    <div id="infoPanel">
        <h3 id="panelTitle">Hover or Click a Building</h3>
        <img id="image" src="">
        <p id="description">Building information will appear here.</p>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/*  MAP SETUP  */

/* Bounds (IMPORTANT: define first) */
var bounds = [[0,0], [1080,1920]];

/* Create map */
var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -1,

    dragging: false,
    scrollWheelZoom: true,
    doubleClickZoom: true,
    boxZoom: true,
    keyboard: false,
    zoomAnimation: true
});

/* Add image */
L.imageOverlay('images/map.jpg', bounds).addTo(map);

/* Fit to image */
map.fitBounds(bounds);

/* Keep map inside bounds */
map.setMaxBounds(bounds);

/* Prevent shifting on zoom */
map.on('zoomend', function() {
    map.panInsideBounds(bounds, { animate: false });
});

/* Fix rendering issue */
setTimeout(() => {
    map.invalidateSize();
}, 100);


/*  PANEL ELEMENTS  */

var panelTitle = document.getElementById("panelTitle");
var image = document.getElementById("image");
var description = document.getElementById("description");

/* Reset panel */
function resetPanel() {
    panelTitle.innerText = "Hover or Click a Building";
    description.innerText = "Building information will appear here.";
    image.style.display = "none";
}

/* Initial state */
resetPanel();


/*  BUILDING DATA  */

var buildings = [
    {
        name: "Shivalik Hostel",
        coords: [[820, 450], [900, 550]],
        image: "images/hostel.jpg",
        desc: "First-year hostel with modern facilities."
    },
    {
        name: "Academic Block",
        coords: [[250, 250], [350, 350]],
        image: "images/academic.jpg",
        desc: "Main academic classrooms and lecture halls."
    },
    {
        name: "Admin Block",
        coords: [[500, 200], [600, 300]],
        image: "images/admin.jpg",
        desc: "Administrative offices and director's office."
    },
    {
        name: "Football Ground",
        coords: [[500, 500], [650, 700]],
        image: "images/ground.jpg",
        desc: "Sports ground used for football and events."
    },
    {
        name: "Mini Campus",
        coords: [[250, 1500], [350, 1700]],
        image: "images/minicampus.jpg",
        desc: "The Mini Campus includes classrooms, labs, and faculty offices. It helps manage space efficiently and provides a focused learning environment."
    }
];


/*  ADD BUILDINGS  */

buildings.forEach(b => {

    var rect = L.rectangle(b.coords, {
        color: "transparent",
        weight: 2,
        fillOpacity: 0
    }).addTo(map);

    /* CLICK */
    rect.on('click', function() {
        panelTitle.innerText = b.name;
        description.innerText = b.desc;

        image.src = b.image;
        image.style.display = "block";
    });

    /* HOVER */
    rect.on('mouseover', function() {
        rect.setStyle({
            color: '#4CAF50',
            weight: 2,
            fillColor: '#4CAF50',
            fillOpacity: 0.15
        });

        panelTitle.innerText = b.name;
        description.innerText = b.desc;

        image.src = b.image;
        image.style.display = "block";
    });

    /* MOUSE OUT */
    rect.on('mouseout', function() {
        rect.setStyle({
            color: 'transparent',
            fillOpacity: 0
        });

        resetPanel();
    });

});

</script>

</body>
</html>

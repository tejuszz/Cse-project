<!DOCTYPE html>
<html>
<head>

<title>Campus Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/map.css">

</head>

<body class="map-page">

<a href="student.html">⬅ Back to Dashboard</a>

<h2 class="title">NIT Delhi Campus Map</h2>

<div id="map"></div>

<!-- INFO PANEL -->
<div id="infoPanel">
    <h3 id="title">Hover or Click a Building</h3>
    <img id="image" src="">
    <p id="description">Building information will appear here.</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -1
});

var bounds = [[0,0], [1080,1920]];

L.imageOverlay('images/map.png', bounds).addTo(map);
map.fitBounds(bounds);

/* ELEMENT REFERENCES */
var title = document.getElementById("title");
var image = document.getElementById("image");
var description = document.getElementById("description");

/* RESET FUNCTION */
function resetPanel() {
    title.innerText = "Hover or Click a Building";
    description.innerText = "Building information will appear here.";
    image.style.display = "none";
}

/* INITIAL STATE */
resetPanel();

/* BUILDING DATA */
var buildings = [
    {
        name: "Shivalik Hostel",
        coords: [[820, 450], [900, 550]],
        image: "images/hostel.jpg",
        desc: "First-year hostel with modern facilities."
    },
    {
        name: "Academic Block",
        coords: [[250, 250], [350, 350]],
        image: "images/academic.jpg",
        desc: "Main academic classrooms and lecture halls."
    },
    {
        name: "Admin Block",
        coords: [[500, 200], [600, 300]],
        image: "images/admin.jpg",
        desc: "Administrative offices and director's office."
    },
    {
        name: "Football Ground",
        coords: [[500, 500], [650, 700]],
        image: "images/ground.jpg",
        desc: "Sports ground used for football and events."
    },
    {
        name: "Mini Campus",
        coords: [[250, 1500], [350, 1700]],
        image: "images/minicampus.jpg",
        desc: "The Mini Campus includes classrooms, labs, and faculty offices. It helps manage space efficiently and provides a focused learning environment for students." 
    }
];

/* ADD BUILDINGS */
buildings.forEach(b => {

    var rect = L.rectangle(b.coords, {
        color: "transparent",
        weight: 2,
        fillOpacity: 0
    }).addTo(map);

    /* CLICK */
    rect.on('click', function() {
        title.innerText = b.name;
        description.innerText = b.desc;

        image.src = b.image;
        image.style.display = "block";
    });

    /* HOVER */
    rect.on('mouseover', function() {
        rect.setStyle({
            color: 'red',
            fillColor: 'red',
            fillOpacity: 0.2
        });

        title.innerText = b.name;
        description.innerText = b.desc;
    });

    /* MOUSE OUT */
    rect.on('mouseout', function() {
        rect.setStyle({
            color: 'transparent',
            fillOpacity: 0
        });

        resetPanel();  // 👈 key fix
    });

});

</script>

</body>
</html>

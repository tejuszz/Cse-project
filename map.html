<!DOCTYPE html>
<html>
<head>

<title>Campus Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map{
height:600px;
width:90%;
margin:auto;
}
</style>

</head>

<body>

<a href="student.html">⬅ Back to Dashboard</a>

<h2>NIT Delhi Campus Map</h2>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

    var map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1
    });

    var bounds = [[0,0], [1080,1920]];

    var image = L.imageOverlay('images/map.png', bounds).addTo(map);
    map.on('click', function(e){
        console.log(e.latlng);
    });
    // fit map to image
    map.fitBounds(bounds);
    // sample markers
    L.marker([555, 513]).addTo(map).bindPopup("Football Ground");

    L.marker([860,494]).addTo(map).bindPopup("Shivalik Hostel");

    L.marker([300, 300]).addTo(map).bindPopup("Academic Block");

    L.marker([550,201]).addTo(map).bindPopup("Admin Block");

    L.marker([200,1400]).addTo(map).bindPopup("Mini Campus");
    
    L.marker([450,1250]).addTo(map).bindPopup("Mechnical Department");

</script>

</body>
</html>

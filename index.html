<!DOCTYPE html>
<html>
    <head>
        <title>NIT Delhi Smart Campus</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>

        <div class="login-box" id="roleSelect">
            <h2>Who are you?</h2>
            <button onclick="selectRole('student')">🎓 Student</button>
            <button onclick="selectRole('professor')">👨‍🏫 Teacher</button>
            <button onclick="selectRole('admin')">⚙ Admin</button>

        </div>


        <div class="login-box" id="loginForm" style="display:none">
            <h2 id="roleTitle"></h2>
            <form onsubmit="return login(event)">

                <input id="username" type="text" placeholder="" required>
                <input id="password" type="password" placeholder="Password" required>
                <button type="submit">Login</button>
                
            </form>

            <button onclick="goBack()">⬅ Back</button>

        </div>

        <script src="js/auth.js"></script>

    </body>
</html>

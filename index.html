<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT Delhi - Smart Campus Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-box">
        <div id="roleSelect">
            <h2>Select Role</h2>
            <button class="role-btn" onclick="selectRole('student')">Student Portal</button>
            <button class="role-btn" onclick="selectRole('professor')">Professor Portal</button>
        </div>

        <form id="loginForm" style="display: none; flex-direction: column; width: 100%;" onsubmit="return login(event)">
            <h2 id="roleTitle">Login</h2>
            
            <input type="text" id="username" placeholder="Enter ID" required>
            <input type="password" id="password" placeholder="Enter Password" required>
            
            <button type="submit">Login</button>
                
            <p onclick="goBack()" style="color: #fff; cursor: pointer; font-size: 12px; margin-top: 15px; text-decoration: underline; text-align: center;">
                ← Back to Role Selection
            </p>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>

    </table>
    </div>

    <!-- 👨‍🎓 STUDENT SECTION -->
    <div id="studentSection">
        <h3>My Attendance</h3>
        <div id="percentageBox"></div>
    </div>
</div>
</div>

<script src="js/attendance.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link rel="stylesheet" href="css/attendance.css">
    <link rel="stylesheet" href="css/back-button.css">
</head>

<body>

<!-- 🔙 Back Button -->
<button type="button" class="universal-back-btn" data-back-button data-fallback="index.html">
    ← Back
</button>
<!-- 🌙 THEME TOGGLE BUTTON -->
<button id="themeToggle" class="theme-btn">🌙</button>

<!-- 🔥 PROFILE HEADER -->
<div class="profile-header">
    <h2 id="studentName">Student Name</h2>
    <p id="studentId">Roll No: XXXX</p>
</div>

<!-- ================= TEACHER SECTION ================= -->
<div id="teacherSection" class="container">

    <h2>Mark Attendance</h2>

    <!-- Subject Dropdown -->
    <select id="subjectSelect"></select>

    <!-- Student Table -->
    <table>
        <thead>
            <tr>
                <th>Student</th>
                <th>Present</th>
                <th>Absent</th>
            </tr>
        </thead>
        <tbody id="studentList"></tbody>
    </table>

</div>

<!-- ================= STUDENT SECTION ================= -->
<div id="studentSection">

    <div class="full-layout">

        <!-- LEFT PANEL (Top Students Ranking) -->
        <div class="side-panel" id="leftOverview">
            <!-- Filled by JS -->
        </div>

        <!-- CENTER PANEL (My Attendance) -->
        <div class="center-card">
            <h3>My Attendance</h3>
            <div id="percentageBox">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- RIGHT PANEL (Class Overview) -->
        <div class="side-panel" id="rightOverview">
            <!-- Filled by JS -->
        </div>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->
<script src="js/back-button.js"></script>
<script src="js/attendance.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link rel="stylesheet" href="css/attendance.css">
    <link rel="stylesheet" href="css/back-button.css">
</head>

<body>

<!-- 🔙 Back Button -->
<button type="button" class="universal-back-btn" data-back-button data-fallback="index.html">
    ← Back
</button>

<!-- 🌙 THEME TOGGLE -->
<button id="themeToggle" class="theme-btn">🌙</button>

<!-- 🔥 PROFILE HEADER -->
<div class="profile-header">
    <h2 id="studentName">Loading...</h2>
    <p id="studentId">Roll No: ...</p>
</div>

<!-- ================= TEACHER SECTION ================= -->
<div id="teacherSection" class="container" style="display:none;">

    <h2>Mark Attendance</h2>

    <select id="subjectSelect"></select>

    <table>
        <thead>
            <tr>
                <th>Student</th>
                <th>Present</th>
                <th>Absent</th>
            </tr>
        </thead>
        <tbody id="studentList"></tbody>
    </table>

</div>

<!-- ================= STUDENT SECTION ================= -->
<div id="studentSection">

    <div class="full-layout">

        <div class="side-panel" id="leftOverview"></div>

        <div class="center-card">
            <h3>My Attendance</h3>
            <div id="percentageBox">Loading...</div>
        </div>

        <div class="side-panel" id="rightOverview"></div>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->
<script src="js/back-button.js"></script>
<script src="js/attendance.js"></script>

<!-- 🔥 HEADER + ROLE CONTROL ONLY (NO markAttendance HERE) -->
<script>
const role = localStorage.getItem("role");
const userId = localStorage.getItem("userId");
const userName = localStorage.getItem("userName");

// Show correct section
if (role === "professor" || role === "teacher") {
    document.getElementById("teacherSection").style.display = "block";
    document.getElementById("studentSection").style.display = "none";
} else {
    document.getElementById("teacherSection").style.display = "none";
    document.getElementById("studentSection").style.display = "block";
}

// Set header info
document.getElementById("studentName").innerText = userName || "User";
document.getElementById("studentId").innerText = "Roll No: " + (userId || "");
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link rel="stylesheet" href="css/attendance.css">
    <link rel="stylesheet" href="css/back-button.css">
</head>

<body>

<button type="button" class="universal-back-btn" data-back-button data-fallback="index.html">← Back</button>

<div class="container">
    <h1>📊 Attendance System</h1>

    <input type="text" id="studentName" placeholder="Enter Student Name">

    <div class="buttons">
        <button class="present" onclick="markPresent()">✔ Present</button>
        <button class="absent" onclick="markAbsent()">✖ Absent</button>
    </div>

    <h2>Records</h2>
    <h3>Attendance Summary</h3>
    <div id="percentageBox"></div>
    <table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="records"></tbody>
</table>
</div>

<script src="js/back-button.js"></script>
<script src="js/attendance.js"></script>

</body>
</html>

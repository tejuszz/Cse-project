<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard - NIT Delhi</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>NIT Delhi</h2>

        <a href="#"><i class="fas fa-home"></i> Dashboard</a>
        <a href="attendance.html"><i class="fas fa-chart-line"></i> Attendance</a>
        <a href="timetable.html"><i class="fas fa-calendar"></i> Timetable</a>
        <a href="study-material.html"><i class="fas fa-book"></i> Study Material</a>
        <a href="map.html"><i class="fas fa-map"></i> Campus Map</a>

        <br>
        <a href="#" onclick="logout()" style="color:#ff6b6b;">
            Logout
        </a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">
            <h2 id="studentName">Welcome</h2>
            <div id="studentId"></div>
        </div>

        <!-- CARDS -->
        <div class="cards">

            <!-- ATTENDANCE -->
            <div class="card">
                <h3>Attendance</h3>
                <div id="percentageBox">Loading...</div>
            </div>

            <!-- QUICK -->
            <div class="card">
                <h3>Quick Access</h3>
                <p>Use sidebar to navigate</p>
            </div>

            <!-- RANK -->
            <div class="card">
                <h3>Rank</h3>
                <p id="rankBox">Loading...</p>
            </div>

            <!-- STATUS -->
            <div class="card">
                <h3>Status</h3>
                <p>Active</p>
            </div>

        </div>

        <!-- EXTRA SECTION -->
        <div style="display:flex; gap:20px; margin-top:20px;">
            <div id="leftOverview" class="card" style="flex:1;"></div>
            <div id="rightOverview" class="card" style="flex:1;"></div>
        </div>

    </div>
</div>

<!-- SCRIPTS -->
<script src="js/auth.js"></script>
<script src="js/attendance.js"></script>

<script>
// ===== FIX NAME DISPLAY =====
const name = localStorage.getItem("userName") || "Student";
const id = localStorage.getItem("userId") || "";

document.getElementById("studentName").innerText = "Welcome, " + name;
document.getElementById("studentId").innerText = "Roll No: " + id;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard - NIT Delhi</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>NIT Delhi</h2>

        <a href="#" class="active"><i class="fas fa-home"></i> Dashboard</a>
        <a href="attendance.html"><i class="fas fa-chart-line"></i> Attendance</a>
        <a href="timetable.html"><i class="fas fa-calendar"></i> Timetable</a>
        <a href="study-material.html"><i class="fas fa-book"></i> Study Material</a>
        <a href="map.html"><i class="fas fa-map"></i> Campus Map</a>

        <br>
        <a href="#" onclick="logout()" style="color:#ff6b6b;">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <h2 id="studentName">👋 Welcome</h2>
                <p class="subtext">Here’s your academic overview</p>
            </div>

            <div class="header-right">
                <span id="studentId"></span>
            </div>
        </div>

        <!-- 🔥 TOP STATS -->
        <div class="top-stats">
            <div class="stat-card" id="overallCard">Overall</div>
            <div class="stat-card" id="rankCard">Rank</div>
            <div class="stat-card" id="avgCard">Class Avg</div>
        </div>

        <!-- 🔥 MAIN GRID -->
        <div class="main-grid">

            <!-- ATTENDANCE -->
            <div class="card big-card">
                <h3>📊 Attendance</h3>
                <div id="percentageBox">Loading...</div>
            </div>

            <!-- RANK -->
            <div class="card rank-card" id="rankBox">
                <h3>🏆 Rank</h3>
            </div>

            <!-- TOP STUDENTS -->
            <div id="leftOverview" class="card">
                <h3>🏆 Top Students</h3>
            </div>

            <!-- CLASS OVERVIEW -->
            <div id="rightOverview" class="card">
                <h3>📚 Class</h3>
            </div>

        </div>

    </div>
</div>

<!-- SCRIPTS -->
<script src="js/auth.js"></script>
<script src="js/attendance.js"></script>

<script>
const name = localStorage.getItem("userName") || "Student";
const id = localStorage.getItem("userId") || "";

document.getElementById("studentName").innerText = "Welcome, " + name;
document.getElementById("studentId").innerText = "Roll No: " + id;
</script>

</body>
</html>
